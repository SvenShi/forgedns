  #     # 常驻路由（不会因 TTL 过期而删除）：
  #     # - 支持 IP 或 CIDR（IP 会自动归一化为 /32 或 /128）
  #     # - 若未开启对应网关家族（gateway4/gateway6），该项会被忽略并汇总提示一次
  #     persistent_route:
  #       ips:
  #         - "1.1.1.1"
  #         - "100.64.1.0/24"
  #         - "2606:4700:4700::1111"
  #         - "2001:db8::/64"
  #       files:
  #         - "/etc/forgedns/persistent_ips.txt"
  #     comment_prefix: "forgedns"
