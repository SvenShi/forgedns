# ForgeDNS default configuration file
#
# See full documentation at:
# https://forgedns.cn

log:
  level: info

plugins:
  # Optional structured query recorder.
  # Enable it near the sequence entry if you want full-path records and SSE/API access.
  #
  # - tag: query_recorder_main
  #   type: query_recorder
  #   args:
  #     path: "./data/query-recorder-main.sqlite"
  #     retention_days: 7
  #     cleanup_interval_hours: 1

  # Forward to upstream DNS servers
  - tag: forward
    type: forward
    args:
      concurrent: 2
      upstreams:
        - addr: "223.5.5.5"
        - addr: "8.8.8.8"

  - tag: main_sequence
    type: sequence
    args:
      # Place the recorder before the main branch if you want complete path capture.
      # - exec: $query_recorder_main
      - exec: $forward
      - exec: accept

  # UDP server listening on :5335
  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: ":5335"

  # TCP server listening on :5335
  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: ":5335"

# Optional management API. Required if you want to query query_recorder data over HTTP/SSE.
#
# api:
#   http: "127.0.0.1:9088"
