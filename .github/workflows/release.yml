name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: forgedns-x86_64-unknown-linux-gnu.tar.gz
            binary_name: forgedns
            build_with: cargo
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_name: forgedns-x86_64-unknown-linux-musl.tar.gz
            binary_name: forgedns
            build_with: cross
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive_name: forgedns-aarch64-unknown-linux-musl.tar.gz
            binary_name: forgedns
            build_with: cross
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: forgedns-x86_64-apple-darwin.tar.gz
            binary_name: forgedns
            build_with: cargo
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: forgedns-aarch64-apple-darwin.tar.gz
            binary_name: forgedns
            build_with: cargo
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: forgedns-x86_64-pc-windows-msvc.zip
            binary_name: forgedns.exe
            build_with: cargo
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.build_with == 'cross'
        run: cargo install cross --version 0.2.5 --locked

      - name: Build release binary with cross
        if: matrix.build_with == 'cross'
        shell: bash
        run: |
          set -euo pipefail
          cross build --locked --release --target "${{ matrix.target }}"

      - name: Build release binary with cargo
        if: matrix.build_with == 'cargo'
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package archive (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp config.yaml LICENSE "target/${{ matrix.target }}/release/"
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${{ matrix.archive_name }}" \
            "${{ matrix.binary_name }}" config.yaml LICENSE

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Path "config.yaml" -Destination "target/${{ matrix.target }}/release/config.yaml"
          Copy-Item -Path "LICENSE" -Destination "target/${{ matrix.target }}/release/LICENSE"
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/${{ matrix.binary_name }}","target/${{ matrix.target }}/release/config.yaml","target/${{ matrix.target }}/release/LICENSE" `
            -DestinationPath "dist/${{ matrix.archive_name }}" `
            -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

  docker:
    name: Publish Docker Images
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - publish
    uses: ./.github/workflows/docker.yml
    with:
      version: ${{ github.ref_name }}
    secrets: inherit
