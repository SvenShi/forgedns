name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "v*"
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "tests/**"
      - "benches/**"
      - "docs/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
      - "v*"
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "tests/**"
      - "benches/**"
      - "docs/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint / Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system packages on Linux
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ipset nftables

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

      - name: Run clippy
        run: cargo +nightly clippy --locked --workspace --all-targets --all-features -- -D warnings

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-shear

      - name: cargo shear
        run: cargo shear

  test:
    name: Test (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            run_build: true
          - os: windows-latest
            rust: stable
            run_build: true
          - os: macos-latest
            rust: stable
            run_build: true
          - os: ubuntu-latest
            rust: beta
            run_build: false

    steps:
      - uses: actions/checkout@v6

      - name: Install system packages on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ipset nftables

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked --workspace --all-features --verbose

      - name: Build
        if: matrix.run_build
        run: cargo build --locked --workspace --all-features --verbose

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --workspace --all-features --no-deps

  docs-site:
    name: Docs Site Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache npm artifacts
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node20-npm-docs-${{ hashFiles('docs/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-npm-docs-

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs site
        working-directory: docs
        run: npm run build
