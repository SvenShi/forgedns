log:
  level: error

plugins:
  - tag: bench_domain_set
    type: domain_set
    args:
      files:
        - "./data/geosite_cn.txt"
        - "./data/geosite_geolocation-!cn.txt"

  - tag: seq_main
    type: sequence
    args:
      - matches: ["qname $bench_domain_set"]
        exec: reject 5
      - exec: reject 2

  - tag: udp_server
    type: udp_server
    args:
      entry: "seq_main"
      listen: "127.0.0.1:5345"
