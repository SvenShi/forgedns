name: Docker

on:
  workflow_dispatch:
    inputs:
      FORGEDNS_VERSION:
        description: "ForgeDNS version tag to embed into image metadata"
        required: false
        type: string
      PUSH:
        description: "Whether to push images"
        required: false
        default: true
        type: boolean

  workflow_call:
    inputs:
      FORGEDNS_VERSION:
        required: false
        type: string
      PUSH:
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME_DOCKERHUB: svenshi/forgedns
  IMAGE_NAME_GHCR: ghcr.io/${{ github.repository }}

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      push: ${{ steps.vars.outputs.push }}
      version: ${{ steps.vars.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      json: ${{ steps.meta.outputs.json }}
    steps:
      - name: Compute vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PUSH=false
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.PUSH }}" == "true" ]]; then
              PUSH=true
            else
              PUSH=false
            fi
          else
            PUSH=true
          fi
          echo "push=${PUSH}" >> "$GITHUB_OUTPUT"

          VERSION="${{ inputs.FORGEDNS_VERSION }}"
          if [[ -z "${VERSION}" ]]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              VERSION="${GITHUB_REF_NAME}"
            else
              VERSION="${GITHUB_SHA}"
            fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_NAME_DOCKERHUB }}
            ${{ env.IMAGE_NAME_GHCR }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: needs.prepare.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          labels: ${{ needs.prepare.outputs.labels }}
          outputs: type=image,"name=${{ env.IMAGE_NAME_DOCKERHUB }},${{ env.IMAGE_NAME_GHCR }}",push-by-digest=true,name-canonical=true,push=true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=forgedns-amd64
          cache-to: type=gha,mode=max,scope=forgedns-amd64
          build-args: |
            FORGEDNS_VERSION=${{ needs.prepare.outputs.version }}

      - name: Export digest
        if: needs.prepare.outputs.push == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: needs.prepare.outputs.push == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digests-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-arm64:
    name: Build arm64
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: needs.prepare.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          labels: ${{ needs.prepare.outputs.labels }}
          outputs: type=image,"name=${{ env.IMAGE_NAME_DOCKERHUB }},${{ env.IMAGE_NAME_GHCR }}",push-by-digest=true,name-canonical=true,push=true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=forgedns-arm64
          cache-to: type=gha,mode=max,scope=forgedns-arm64
          build-args: |
            FORGEDNS_VERSION=${{ needs.prepare.outputs.version }}

      - name: Export digest
        if: needs.prepare.outputs.push == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: needs.prepare.outputs.push == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digests-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-amd64
      - build-arm64
    if: |
      always() &&
      needs.prepare.outputs.push == 'true' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create manifests
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t TAGS < <(jq -r '.tags[]' <<< '${{ needs.prepare.outputs.json }}')

          if [[ ${#TAGS[@]} -eq 0 ]]; then
            echo "No tags generated by metadata-action"
            exit 1
          fi

          for TAG in "${TAGS[@]}"; do
            REPO="${TAG%%:*}"
            ARGS=()

            for f in /tmp/digests/*; do
              DIGEST="sha256:$(basename "$f")"
              ARGS+=("${REPO}@${DIGEST}")
            done

            echo "Creating manifest for $TAG"
            docker buildx imagetools create -t "$TAG" "${ARGS[@]}"
          done

      - name: Inspect Docker Hub image
        shell: bash
        run: |
          mapfile -t TAGS < <(jq -r '.tags[]' <<< '${{ needs.prepare.outputs.json }}')
          for TAG in "${TAGS[@]}"; do
            docker buildx imagetools inspect "$TAG" || true
          done
