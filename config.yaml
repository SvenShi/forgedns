log:
 level: info

plugins:
  - tag: forward
    type: forward
    args:
      upstreams:
        - addr: "223.5.5.5"  # 阿里 DNS
          # dial_addr: "223.5.5.5"  # 阿里 DNS
          # socks5: "127.0.0.1:7897"
          # insecure_skip_verify: true
          # bootstrap: 223.5.5.5
          # enable_pipeline: true
        # 配置多个上游时，forward 默认并发为 1（随机起点），可通过 concurrent 调整（最大 3）
        # - addr: "119.29.29.29"  # 腾讯 DNS
        # - addr: "114.114.114.114"  # 114 DNS
  - tag: debug_print
    type: debug_print
    args:
      before:
        - from {src_addr}
      after:
        - response success

  - tag: cache
    type: cache
    args:
      ecs_in_key: false
      short_circuit: true
      dump_file: "./dns_cache.dump"
      dump_interval: 10

  - tag: seq
    type: sequence
    args:
      - matches: ["qtype A", "qname example.com"]
        exec: $cache
      # 在选中的策略分支里先放 mikrotik，再放实际 forward：
      # - matches: ["mark route_via_mikrotik"]
      #   exec: $mikrotik_dynamic_route
      - exec: forward 223.5.5.5

  # - tag: mikrotik_dynamic_route
  #   type: mikrotik
  #   args:
  #     # 注意：插件不会自动创建 routing table / routing rule / 默认路由，
  #     # 这些前置项需要在 RouterOS 里手动配置好。
  #     address: "172.16.1.1:8728"
  #     username: "api-user"
  #     password: "secret"
  #     async: true
  #     routing_table: "forgedns_dynamic"
  #     gateway4: "172.16.1.2"
