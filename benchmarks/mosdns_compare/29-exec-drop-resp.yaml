log:
  level: error

plugins:
  - tag: seq_main
    type: sequence
    args:
      - exec: black_hole 192.0.2.10
      - exec: drop_resp
      - exec: black_hole 192.0.2.10
      - exec: accept

  - tag: udp_server
    type: udp_server
    args:
      entry: "seq_main"
      listen: "127.0.0.1:5329"
