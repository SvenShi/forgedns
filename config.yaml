# OxiDNS default configuration file
#
# See full documentation at:
# https://oxidns.cn

log:
  level: info

# Management API (optional)
# api:
#   http:
#     listen: "0.0.0.0:8080"
#     # auth:
#     #   type: basic
#     #   username: admin
#     #   password: secret
#     # CORS is inferred from listen by default; set this only to override it.
#     # cors:
#     #   allowed_origins:
#     #     - "http://localhost:3000"

plugins:
  # Forward to upstream DNS servers
  - tag: forward
    type: forward
    args:
      concurrent: 2
      upstreams:
        - addr: "223.5.5.5"
        - addr: "8.8.8.8"

  - tag: main_sequence
    type: sequence
    args:
      # Place the recorder before the main branch if you want complete path capture.
      # - exec: $query_recorder_main
      - exec: $forward
      - exec: accept

  # UDP server listening on :5335
  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: ":5335"

  # TCP server listening on :5335
  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: ":5335"
