log:
  level: error

plugins:
  - tag: forward_main
    type: forward
    args:
      upstreams:
        - addr: "223.5.5.5"

  - tag: udp_server
    type: udp_server
    args:
      entry: "forward_main"
      listen: "127.0.0.1:5303"

  - tag: tcp_server
    type: tcp_server
    args:
      entry: "forward_main"
      listen: "127.0.0.1:5303"
